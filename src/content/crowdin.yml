project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
preserve_hierarchy: true

export_languages:
  - de
  - da
  - fr
  - pt-PT
  - es-ES
  - tr
  - zh-CN

files:
  - source: /docs/**/*.mdx
    translation: /docs/%locale%/**/%original_file_name%
    languages_mapping:
      locale: &locale_mapping
        de: de
        da: da
        fr: fr
        pt-PT: pt
        es-ES: es
        tr: tr
        zh-CN: zh
    ignore:
      - /docs/de/**/*.mdx
      - /docs/da/**/*.mdx
      - /docs/fr/**/*.mdx
      - /docs/pt/**/*.mdx
      - /docs/es/**/*.mdx
      - /docs/tr/**/*.mdx
      - /docs/zh/**/*.mdx
      # English-only legal pages (see englishOnlyPages in src/utils/i18n.ts)
      - /docs/docs/terms.mdx
      - /docs/docs/privacy-policy.mdx
      - /docs/docs/security-policy.mdx
      - /docs/docs/sub-processors.mdx

  - source: /i18n/en.json
    translation: /i18n/%locale%.json
    languages_mapping:
      # Starlight keys UI translations by each locale's BCP-47 `lang` tag
      locale:
        de: de
        da: da
        fr: fr
        pt-PT: pt-PT
        es-ES: es-ES
        tr: tr-TR
        zh-CN: zh-CN

  - source: /includes/*.mdx
    translation: /includes/%locale%/%original_file_name%
    languages_mapping:
      locale: *locale_mapping
    ignore:
      - /includes/de/**/*.mdx
      - /includes/da/**/*.mdx
      - /includes/fr/**/*.mdx
      - /includes/pt/**/*.mdx
      - /includes/es/**/*.mdx
      - /includes/tr/**/*.mdx
      - /includes/zh/**/*.mdx
