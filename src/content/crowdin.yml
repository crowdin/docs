project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
preserve_hierarchy: true

files:
  - source: /src/content/docs/**/*.mdx
    translation: /src/content/docs/%locale%/**/%original_file_name%
    ignore:
      - /src/content/docs/de/**/*.mdx

  - source: /src/content/i18n/en.json
    translation: /src/content/i18n/%locale%.json

  - source: /src/content/i18n/sidebar/en.json
    translation: /src/content/i18n/sidebar/%locale%.json
