project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
preserve_hierarchy: true

export_languages:
  - de
  - da
  - fr
  - pt-PT
  - es-ES

files:
  - source: /docs/**/*.mdx
    translation: /docs/%locale%/**/%original_file_name%
    languages_mapping:
      locale: &locale_mapping
        de: de
        da: da
        fr: fr
        pt-PT: pt
        es-ES: es
    ignore:
      - /docs/de/**/*.mdx
      - /docs/da/**/*.mdx
      - /docs/fr/**/*.mdx
      - /docs/pt/**/*.mdx
      - /docs/es/**/*.mdx

  - source: /strings/en.json
    translation: /strings/%locale%.json
    languages_mapping:
      locale: *locale_mapping

  - source: /includes/*.mdx
    translation: /includes/%locale%/%original_file_name%
    languages_mapping:
      locale: *locale_mapping
    ignore:
      - /includes/de/**/*.mdx
      - /includes/da/**/*.mdx
      - /includes/fr/**/*.mdx
      - /includes/pt/**/*.mdx
      - /includes/es/**/*.mdx
