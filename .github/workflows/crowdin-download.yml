name: Crowdin - Download Translations

on:
  schedule:
    - cron: "0 15 * * *" # Run every day at 15:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  download-translations:
    if: github.repository == 'crowdin/docs'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: update-crowdin-translations
          create_pull_request: true
          commit_message: "chore: update translations"
          pull_request_title: "chore: update translations"
          pull_request_body: "This automated PR updates translations from Crowdin."
          pull_request_base_branch_name: main
          config: src/content/crowdin.yml
          crowdin_branch_name: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
