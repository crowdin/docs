name: Translations Build

on:
  push:
    branches:
      - update-crowdin-translations

jobs:
  build-localization:
    if: github.repository == 'crowdin/docs'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
